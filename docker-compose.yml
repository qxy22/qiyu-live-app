services:
  qiyu-live-gateway:
    image: qiyu-live-gateway-docker:1.0-SNAPSHOT
    build:
      context: ./qiyu-live-Gateway/target
      dockerfile: ../docker/Dockerfile
    container_name: qiyu-live-gateway
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      SERVER_PORT: 8086
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR:-host.docker.internal:8848}
      NACOS_USERNAME: ${NACOS_USERNAME:-qiyu}
      NACOS_PASSWORD: ${NACOS_PASSWORD:-qiyu}
      NACOS_NAMESPACE: ${NACOS_NAMESPACE:-qiyu-live-test}
      TZ: Asia/Shanghai
    networks:
      - qiyu-live-net

  qiyu-live-api:
    image: qiyu-live-api-docker:1.0-SNAPSHOT
    build:
      context: ./qiyu-live-api/target
      dockerfile: ../docker/Dockerfile
    container_name: qiyu-live-api
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR:-host.docker.internal:8848}
      NACOS_USERNAME: ${NACOS_USERNAME:-qiyu}
      NACOS_PASSWORD: ${NACOS_PASSWORD:-qiyu}
      NACOS_NAMESPACE: ${NACOS_NAMESPACE:-qiyu-live-test}
      TZ: Asia/Shanghai
    networks:
      - qiyu-live-net

  qiyu-live-user-provider:
    image: qiyu-live-user-provider-docker:1.0-SNAPSHOT
    build:
      context: ./qiyu-live-user-provider/target
      dockerfile: ../docker/Dockerfile
    container_name: qiyu-live-user-provider
    restart: unless-stopped
    ports:
      - "8085:8085"
      - "9090:9090"
    environment:
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR:-host.docker.internal:8848}
      NACOS_USERNAME: ${NACOS_USERNAME:-qiyu}
      NACOS_PASSWORD: ${NACOS_PASSWORD:-qiyu}
      NACOS_NAMESPACE: ${NACOS_NAMESPACE:-qiyu-live-test}
      TZ: Asia/Shanghai
    networks:
      - qiyu-live-net

networks:
  qiyu-live-net:
    name: qiyu-live-net

